<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-hero">
      <section class="auth-outer-glass">
        <img class="auth-tagline" src="../../../log_page_resource/text_line.png" alt="Health tagline" />
        <section class="auth-inner-glass">
          <div class="auth-switch">
            <a class="active" href="./login.html">SIGN IN</a>
            <a href="./signup.html">SIGN UP</a>
          </div>
          <p id="auth-status" class="muted auth-status"></p>
          <form id="login-form" class="auth-form" action="#">
            <div><label>E-MAIL</label><input name="email" type="email" required /></div>
            <div><label>PASSWORD</label><input name="password" type="password" required /></div>
            <div>
              <label>USER TYPE</label>
              <select name="role" required>
                <option value="public">Public</option>
                <option value="doctor">Doctor</option>
                <option value="vendor">Vendor</option>
              </select>
            </div>
            <button class="btn auth-submit" type="submit">SIGN IN</button>
          </form>
        </section>
      </section>
      
    </section>
  </main>
  <script src="../../js/modules/auth.js" defer></script>
</body>
</html>
